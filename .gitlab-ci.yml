stages:
  - deploy

deploy_to_vps:
  stage: deploy
  only:
    - main
  before_script:
    - 'which ssh-agent || ( apt-get update -y && apt-get install openssh-client -y )'
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H 185.69.155.141 >> ~/.ssh/known_hosts
  script:
    - |
      ssh -o StrictHostKeyChecking=no root@185.69.155.141 << 'ENDSSH'
        set -e
        cd /root/Vadim/ProjectsNodejsVadim/clipsa
        git pull origin-gitlab main

        # Source nvm script and use the version specified in .nvmrc
        export NVM_DIR="$HOME/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"  # This loads nvm
        [ -s "$NVM_DIR/bash_completion" ] && \. "$NVM_DIR/bash_completion"  # This loads nvm bash_completion
        nvm use

        npm install
        npm run build
        pm2 reload 9
      ENDSSH
